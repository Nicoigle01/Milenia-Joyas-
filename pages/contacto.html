<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Red+Hat+Mono:wght@300..700&family=Spline+Sans:wght@300..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <section>
        <div>
            <ul>
                <li class="logoWhatsapp">
                    <a class="wa" href="https://wa.me/5491132017045" target="_blank" alt="Whatsapp"> </a>
                </li>
            </ul>
        </div>
    </section>
    <header>
        <a href="../index.html">
            <img src="../img/mileniaJoyasChico.jpg" alt="Logo principal" class="logoHeader">
        </a>
        <a href="../index.html">
            <h1 class="tituloPrincipal">Milenia joyas </h1>
        </a>
        <nav class="navHeader">
            <ul>
                <li>
                    <a href="../index.html">Inicio </a>
                </li>
            </ul>
            <ul>
                <li>
                    <a href="./catalogo.html">Catálogo </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="mainContacto">
        <div class="textcontacto">
            <p>Para consultarnos por pedidos mayoristias y/o personalizados, completa el formulario y nos contactaremos
                con usted.</p>
        </div>
        <form class="formularioContacto">
            <div class="cajaFormulario">
                <label for="fullname" class="titulosFormularios textMayusc">Nombre y apellido</label>
                <input type="text" id="fullname" name="fullname" placeholder="Nombre y apellido completo" required>
            </div>
            <div class="cajaFormulario">
                <label for="email" class="titulosFormularios textMayusc">Email</label>
                <input type="email" id="email" name="email" placeholder="Coloque un mail valido" required>
            </div>
            <div class="cajaFormulario">
                <label for="phone" class="titulosFormularios textMayusc">Telefono</label>
                <input type="tel" id="phone" name="phone" placeholder="Coloque un numero valido" required>
            </div>
            <div class="cajaFormulario">
                <label for="text" class="titulosFormularios textMayusc">Mensaje</label>
                <textarea type="text" id="text" name="text" placeholder="Coloque su consulta aqui" required></textarea>
            </div>
            <div class="buttonEnviar">
                <button type="submit" class="botonEnviar">Enviar</button>
            </div>
        </form>
    </main>
    <footer>
        <section class="informacionConsumidor">
            <div>
                <p>Ante cualquier duda no dude en escribirnos</p>
            </div>
            <div>
                <ul>
                    <li>
                        <a href="../index.html"> Volver al inicio</a>
                    </li>
                </ul>
            </div>
        </section>
    </footer>
</body>

</html>
